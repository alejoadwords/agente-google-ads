<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte de campañas</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1E2BCC;--blue-lt:#EEF0FD;--blue-md:#C7CBFB;
  --text:#0A0A0A;--muted:#6B7280;--muted2:#9CA3AF;
  --border:#E5E7EB;--bg:#F9FAFB;--white:#FFFFFF;
  --success:#059669;--warning:#D97706;--danger:#DC2626;
  --font:'Outfit',sans-serif;--r:10px;--rlg:16px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding:0}

/* Header */
.rpt-header{background:var(--white);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.rpt-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.rpt-logo-icon{width:28px;height:28px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center}
.rpt-logo-name{font-size:15px;font-weight:700;color:var(--text)}
.rpt-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--blue-lt);color:var(--blue);border:1px solid var(--blue-md)}

/* Main */
.rpt-main{max-width:780px;margin:0 auto;padding:32px 20px 60px}

/* Hero */
.rpt-hero{background:var(--white);border:1px solid var(--border);border-radius:var(--rlg);padding:28px 32px;margin-bottom:24px}
.rpt-hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.rpt-client-name{font-size:26px;font-weight:700;letter-spacing:-.5px;color:var(--text)}
.rpt-period-badge{font-size:12px;font-weight:600;padding:5px 14px;border-radius:20px;background:var(--blue-lt);color:var(--blue);border:1px solid var(--blue-md);white-space:nowrap}
.rpt-hero-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.rpt-hero-meta-item{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:5px}

/* Summary */
.rpt-summary{background:var(--blue-lt);border:1px solid var(--blue-md);border-radius:var(--r);padding:16px 20px;margin-bottom:24px}
.rpt-summary-label{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.rpt-summary-text{font-size:14px;color:var(--text);line-height:1.65;white-space:pre-wrap}

/* Platform sections */
.rpt-section{background:var(--white);border:1px solid var(--border);border-radius:var(--rlg);padding:24px;margin-bottom:16px}
.rpt-section-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.rpt-section-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rpt-section-title{font-size:16px;font-weight:700;color:var(--text)}
.rpt-section-sub{font-size:12px;color:var(--muted);margin-top:1px}

/* KPI grid */
.rpt-kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.rpt-kpi-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.rpt-kpi-label{font-size:11px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.rpt-kpi-value{font-size:22px;font-weight:700;color:var(--text);line-height:1}
.rpt-kpi-unit{font-size:13px;font-weight:500;color:var(--muted);margin-top:3px}

/* Custom KPIs */
.rpt-kpi-card.custom{border-style:dashed}

/* Footer */
.rpt-footer{margin-top:40px;text-align:center;padding-top:24px;border-top:1px solid var(--border)}
.rpt-footer-text{font-size:12px;color:var(--muted2);margin-bottom:8px}
.rpt-footer-brand{font-size:12px;font-weight:600;color:var(--muted)}

/* Loading / error */
.rpt-loading{text-align:center;padding:80px 20px}
.rpt-loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.rpt-error{text-align:center;padding:80px 20px;color:var(--danger)}

/* Platform icon backgrounds */
.icon-google{background:#E8F0FE}
.icon-meta{background:#EEF2FF}
.icon-tiktok{background:#F0F0F0}
.icon-linkedin{background:#E8F3FC}

/* Print */
@media print{
  .rpt-header{box-shadow:none}
  body{background:#fff}
}

/* Mobile */
@media(max-width:640px){
  .rpt-hero{padding:20px}
  .rpt-client-name{font-size:22px}
  .rpt-section{padding:16px}
  .rpt-kpi-grid{grid-template-columns:1fr 1fr}
  .rpt-main{padding:16px 12px 40px}
}
</style>
</head>
<body>

<div class="rpt-header">
  <a class="rpt-logo" href="https://acuarius.app">
    <div class="rpt-logo-icon">
      <svg width="16" height="16" viewBox="0 0 75 75" fill="none"><path fill="#fff" d="M67.52 61.99L53.7 38.06l-6.09 10.57 10.76 18.64c.97 1.68 2.75 2.64 4.58 2.64.89 0 1.8-.24 2.63-.72 2.54-1.46 3.4-4.68 1.94-7.2z"/><path fill="#fff" d="M57.82 24.91l-5.86 10.16-6.1 10.56-9.44 16.35c-2.82 4.9-8.1 7.95-13.75 7.95-5.74 0-10.89-2.97-13.77-7.95-2.87-4.97-2.87-10.92 0-15.89L25.41 17.5c1.72-2.97 4.79-4.75 8.21-4.75s6.49 1.78 8.21 4.75l.6 1.04 1.71 2.96-6.1 10.57-4.42-7.65L18.06 51.36c-1.39 2.4-.47 4.53 0 5.33.47.8 1.84 2.67 4.62 2.67 1.89 0 3.67-1.02 4.6-2.67l12.48-21.62 6.11-10.57 2.8-4.86c1.46-2.53 4.69-3.4 7.22-1.93 2.52 1.45 3.39 4.67 1.93 7.2z"/><circle fill="#fff" cx="60.13" cy="10.7" r="5.3"/></svg>
    </div>
    <span class="rpt-logo-name">acuarius</span>
  </a>
  <span class="rpt-badge">Reporte de campañas</span>
</div>

<div class="rpt-main" id="rpt-main">
  <div class="rpt-loading" id="rpt-loading">
    <div class="rpt-loading-spinner"></div>
    <div style="font-size:14px;color:var(--muted)">Cargando reporte...</div>
  </div>
</div>

<script>
const PLATFORM_INFO = {
  google:   { name: 'Google Ads',    sub: 'Search · Display · YouTube', color: '#4285F4', bg: 'icon-google',
    icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>' },
  meta:     { name: 'Meta Ads',      sub: 'Facebook · Instagram', color: '#1877F2', bg: 'icon-meta',
    icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>' },
  tiktok:   { name: 'TikTok Ads',    sub: 'In-Feed · TopView · Spark', color: '#010101', bg: 'icon-tiktok',
    icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="#010101"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.78a4.85 4.85 0 01-1.01-.09z"/></svg>' },
  linkedin: { name: 'LinkedIn Ads',  sub: 'Sponsored · Message Ads', color: '#0A66C2', bg: 'icon-linkedin',
    icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="#0A66C2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>' },
};

const KPI_LABELS = {
  inversion:'Inversión', impresiones:'Impresiones', alcance:'Alcance', clics:'Clics',
  ctr:'CTR', cpm:'CPM', cpc:'CPC', leads:'Leads', conversiones:'Conversiones',
  cpa:'CPA', roas:'ROAS', engagement:'Engagement',
  // Google específicos
  quality_score:'Quality Score', impression_share:'Impression Share',
  // Meta específicos
  frecuencia:'Frecuencia', resultados:'Resultados', cpr:'Costo por resultado',
  // TikTok específicos
  reproducciones:'Reproducciones', vtr:'VTR', cpv:'CPV',
  // LinkedIn específicos
  leads_b2b:'Leads calificados', cpl_b2b:'CPL', aperturas:'Aperturas', conexiones:'Conexiones',
};

const KPI_FORMAT = {
  inversion:{prefix:'$'}, cpm:{prefix:'$'}, cpc:{prefix:'$'}, cpa:{prefix:'$'}, cpr:{prefix:'$'}, cpv:{prefix:'$'}, cpl_b2b:{prefix:'$'},
  ctr:{suffix:'%'}, roas:{suffix:'x'}, vtr:{suffix:'%'}, impression_share:{suffix:'%'},
};

const PERIOD_LABELS = {
  semana:'Última semana', mes:'Último mes', trimestre:'Último trimestre',
};

function formatVal(kpi, val) {
  if (!val) return '—';
  const fmt = KPI_FORMAT[kpi] || {};
  const num = parseFloat(val.toString().replace(/[^0-9.]/g,''));
  const isNum = !isNaN(num);
  if (fmt.prefix) return fmt.prefix + (isNum ? num.toLocaleString('es-CO', {minimumFractionDigits: val.toString().includes('.') ? 2 : 0, maximumFractionDigits: 2}) : val);
  if (fmt.suffix) return (isNum ? num.toLocaleString('es-CO', {maximumFractionDigits: 2}) : val) + fmt.suffix;
  return isNum ? num.toLocaleString('es-CO') : val;
}

function periodLabel(report) {
  if (report.period === 'custom' && report.date_from && report.date_to) {
    const fmt = d => new Date(d + 'T00:00:00').toLocaleDateString('es-CO', { day:'2-digit', month:'short', year:'numeric' });
    return fmt(report.date_from) + ' — ' + fmt(report.date_to);
  }
  return PERIOD_LABELS[report.period] || report.period || 'Período';
}

function renderReport(report) {
  const main = document.getElementById('rpt-main');
  const platforms = report.platforms || [];
  const metrics   = report.metrics   || {};
  const kpis      = report.kpis      || {};

  let html = '';

  // Hero
  const genDate = new Date(report.created_at).toLocaleDateString('es-CO', { day:'2-digit', month:'long', year:'numeric' });
  html += `
    <div class="rpt-hero">
      <div class="rpt-hero-top">
        <div>
          <div class="rpt-client-name">${esc(report.client_name)}</div>
          ${report.agency_name ? `<div style="font-size:13px;color:var(--muted);margin-top:3px">Presentado por ${esc(report.agency_name)}</div>` : ''}
        </div>
        <span class="rpt-period-badge">${esc(periodLabel(report))}</span>
      </div>
      <div class="rpt-hero-meta">
        <span class="rpt-hero-meta-item">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          Generado el ${genDate}
        </span>
        <span class="rpt-hero-meta-item">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          ${(report.views || 0).toLocaleString('es-CO')} vistas
        </span>
        ${platforms.length > 0 ? `<span class="rpt-hero-meta-item">${platforms.length} plataforma${platforms.length > 1 ? 's' : ''}</span>` : ''}
      </div>
    </div>`;

  // Resumen ejecutivo
  if (report.summary) {
    html += `
    <div class="rpt-summary">
      <div class="rpt-summary-label">Resumen ejecutivo</div>
      <div class="rpt-summary-text">${esc(report.summary)}</div>
    </div>`;
  }

  // Secciones por plataforma
  platforms.forEach(plat => {
    const info       = PLATFORM_INFO[plat] || { name: plat, sub: '', bg: '', icon: '' };
    const platKpis   = kpis[plat]    || [];
    const platMetrics= metrics[plat] || {};

    html += `
    <div class="rpt-section">
      <div class="rpt-section-header">
        <div class="rpt-section-icon ${info.bg}">${info.icon}</div>
        <div>
          <div class="rpt-section-title">${esc(info.name)}</div>
          ${info.sub ? `<div class="rpt-section-sub">${esc(info.sub)}</div>` : ''}
        </div>
      </div>
      <div class="rpt-kpi-grid">`;

    platKpis.forEach(kpi => {
      const val   = platMetrics[kpi] || '';
      const label = KPI_LABELS[kpi] || kpi;
      const fmtVal= formatVal(kpi, val);
      const isCustom = !KPI_LABELS[kpi];
      html += `
        <div class="rpt-kpi-card${isCustom ? ' custom' : ''}">
          <div class="rpt-kpi-label">${esc(label)}</div>
          <div class="rpt-kpi-value">${esc(fmtVal)}</div>
        </div>`;
    });

    html += `</div></div>`;
  });

  // Footer
  html += `
    <div class="rpt-footer">
      <div class="rpt-footer-text">Este reporte fue generado con inteligencia artificial</div>
      <div class="rpt-footer-brand">Powered by Acuarius · acuarius.app</div>
    </div>`;

  main.innerHTML = html;
  // Update page title
  document.title = 'Reporte ' + periodLabel(report) + ' — ' + report.client_name;
}

function esc(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

async function loadReport() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (!id) {
    document.getElementById('rpt-main').innerHTML =
      '<div class="rpt-error"><div style="font-size:40px;margin-bottom:12px">📊</div><div style="font-size:16px;font-weight:600;margin-bottom:6px">Reporte no encontrado</div><div style="font-size:13px;color:var(--muted)">El enlace no contiene un ID de reporte válido.</div></div>';
    return;
  }

  try {
    const res = await fetch('/api/report?id=' + encodeURIComponent(id));
    if (!res.ok) throw new Error('not found');
    const { report } = await res.json();
    renderReport(report);
  } catch {
    document.getElementById('rpt-main').innerHTML =
      '<div class="rpt-error"><div style="font-size:40px;margin-bottom:12px">⚠️</div><div style="font-size:16px;font-weight:600;margin-bottom:6px">Reporte no disponible</div><div style="font-size:13px;color:var(--muted)">Es posible que el enlace haya expirado o sea incorrecto.</div></div>';
  }
}

loadReport();
</script>
</body>
</html>
