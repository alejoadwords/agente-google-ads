<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acuarius — iniciando sesión...</title>
  <script
    async
    src="https://clerk.acuarius.app/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    data-clerk-publishable-key="pk_live_Y2xlcmsuYWN1YXJpdXMuYXBwJA"
  ></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F9FAFB;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .wrap{text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px}
    .logo{width:44px;height:44px;border-radius:10px;overflow:hidden}
    .spinner{width:24px;height:24px;border:2.5px solid #E5E7EB;border-top-color:#1E2BCC;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    p{font-size:14px;color:#6B7280}
    .err{font-size:13px;color:#DC2626;max-width:320px;line-height:1.5;display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 75 75">
      <rect width="75" height="75" fill="#1E2BCC" rx="8"/>
      <path fill="#fff" d="M67.52 61.99L53.7 38.06l-6.09 10.57 10.76 18.64c.97 1.68 2.75 2.64 4.58 2.64.89 0 1.8-.24 2.63-.72 2.54-1.46 3.4-4.68 1.94-7.2z"/>
      <path fill="#fff" d="M57.82 24.91l-5.86 10.16-6.1 10.56-9.44 16.35c-2.82 4.9-8.1 7.95-13.75 7.95-5.74 0-10.89-2.97-13.77-7.95-2.87-4.97-2.87-10.92 0-15.89L25.41 17.5c1.72-2.97 4.79-4.75 8.21-4.75s6.49 1.78 8.21 4.75l.6 1.04 1.71 2.96-6.1 10.57-4.42-7.65L18.06 51.36c-1.39 2.4-.47 4.53 0 5.33.47.8 1.84 2.67 4.62 2.67 1.89 0 3.67-1.02 4.6-2.67l12.48-21.62 6.11-10.57 2.8-4.86c1.46-2.53 4.69-3.4 7.22-1.93 2.52 1.45 3.39 4.67 1.93 7.2z"/>
      <circle fill="#fff" cx="60.13" cy="10.7" r="5.3"/>
    </svg>
    <div class="spinner"></div>
    <p>Iniciando sesión...</p>
    <p class="err" id="err"></p>
  </div>

  <script>
    window.addEventListener('load', async () => {
      try {
        await window.Clerk.load();
        // Manejar el callback de SSO
        const result = await window.Clerk.handleRedirectCallback({
          afterSignInUrl: '/',
          afterSignUpUrl: '/',
        });
        // Si Clerk no redirige automáticamente
        window.location.href = '/';
      } catch (e) {
        console.error('SSO callback error:', e);
        const errEl = document.getElementById('err');
        errEl.textContent = 'Error al iniciar sesión. Redirigiendo...';
        errEl.style.display = 'block';
        setTimeout(() => { window.location.href = '/login.html'; }, 2000);
      }
    });
  </script>
</body>
</html>
